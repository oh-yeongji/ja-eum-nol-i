<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/CSS/style.css" />
    <title>초성게임</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="dim"></div>
    <div class="startBtn">시작하기</div>

    <div class="gameScreen">
      <div class="chosungContainer">
        <div class="chosungScreen">??</div>
        <div class="chosungLoad">초성추출</div>
      </div>
    </div>
    <div class="gameSettings">
      <i class="fa-solid fa-gear"></i>
      <div class="timeSetting">
        <i class="fa-regular fa-clock"></i>
        <div class="timeModal">
          <h2>시간설정</h2>
          <div class="timeCloseBtn"><i class="fa-solid fa-x"></i></div>
          <div class="timePanel">
            <div class="previousBtn">
              <i class="fa-solid fa-angle-left"></i>
            </div>
            <div class="timeScreen">
              <div>15s</div>
              <div>30s</div>
              <div>45s</div>
              <div>60s</div>
            </div>
            <div class="nextBtn">
              <i class="fa-solid fa-angle-right"></i>
            </div>
          </div>
        </div>
      </div>
      <div class="gameInfo">
        <i class="fa-solid fa-question"></i>
        <div class="gameInfoModal">
          <div class="gameInfoCloseBtn">
            <i class="fa-solid fa-x"></i>
            <!-- <p>
              초성게임은 주어진 시간안에 초성에 알맞은 단어를 상대방보다 더 많이
              입력한 사람이 이기는 게임입니다.
            </p> -->
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="/index.js"></script>
</html>
