<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />

    <title>초성게임</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="wrap">
      <div class="dim"></div>

      <div class="gameSettings">
        <i class="fa-solid fa-gear"></i>
        <div class="timeSetting">
          <i class="fa-regular fa-clock"></i>
          <div class="timeModal">
            <h2>시간설정</h2>
            <div class="timeCloseBtn"><i class="fa-solid fa-x"></i></div>

            <div class="timePanel">
              <div class="timeScreen">
                <ul class="timeSlide">
                  <li>15s</li>
                  <li>30s</li>
                  <li>45s</li>
                  <li>60s</li>
                </ul>
              </div>

              <div class="arrows">
                <div class="prev">
                  <i class="fa-solid fa-angle-left"></i>
                </div>
                <div class="next">
                  <i class="fa-solid fa-angle-right"></i>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="gameInfo">
          <i class="fa-solid fa-question"></i>
          <div class="gameInfoModal">
            <div class="gameInfoCloseBtn">
              <i class="fa-solid fa-x"></i>
            </div>
            <h2>
              초성게임은 주어진 시간 안에 초성에 알맞은 단어를 상대방보다 더
              많이 입력한 사람이 이기는 게임입니다.
            </h2>
          </div>
        </div>
      </div>

      <div class="enterRoomBtn">입장하기</div>

      <div class="gameRoom">
        <div class="player1Section">
          <div class="p1Name">player1</div>
          <div class="p1Photo">
            <div class="avatar">
              <svg
                width="200"
                height="150"
                viewBox="0 0 180 180"
                xmlns="http://www.w3.org/2000/svg"
              >
                <!-- 배경 원 -->
                <circle cx="90" cy="90" r="90" fill="url(#bgGrad2)" />

                <defs>
                  <linearGradient id="bgGrad2" x1="0" y1="0" x2="180" y2="0">
                    <stop offset="0%" stop-color="#c3b1e1" />
                    <!-- 연보라색 -->
                    <stop offset="100%" stop-color="#f7c5d9" />
                    <!-- 연핑크색 -->
                  </linearGradient>
                </defs>

                <!-- 캐릭터 그룹 (머리, 얼굴, 드레스) -->
                <g id="character2">
                  <!-- 머리 -->
                  <g id="hair2">
                    <path
                      d="M50 70 Q90 15 130 70 Q125 140 55 130 Z"
                      fill="#f4a261"
                    />
                  </g>

                  <!-- 얼굴 -->
                  <g id="face2">
                    <circle cx="90" cy="90" r="30" fill="#ffe0c0" />
                    <circle cx="78" cy="85" r="4" fill="#3B2C2C" />
                    <circle cx="102" cy="85" r="4" fill="#3B2C2C" />
                    <path
                      d="M78 105 Q90 115 102 105"
                      stroke="#c47171"
                      stroke-width="3"
                      fill="none"
                    />
                  </g>

                  <!-- 드레스 -->
                  <g id="dress2">
                    <path
                      d="M60 130 Q90 160 120 130 L120 170 L60 170 Z"
                      fill="#6a9cf7"
                      stroke="#4574c1"
                      stroke-width="3"
                    />
                  </g>
                </g>

                <!-- 왕관 -->
                <g id="crown2">
                  <path
                    d="M50 50 L65 30 L80 50 L95 30 L110 50 L50 50 Z"
                    fill="#ffdd55"
                    stroke="#ccaa00"
                    stroke-width="3"
                  />
                  <circle cx="65" cy="30" r="4" fill="#fff88f" />
                  <circle cx="95" cy="30" r="4" fill="#fff88f" />
                </g>
              </svg>
            </div>
          </div>

          <div class="p1ChatSrceen">
            <div class="p1ChatList"></div>
          </div>
        </div>

        <div class="gameCenter">
          <div class="chosungContainer">
            <div class="chosungScreen">
              <div class="firstCho">?</div>
              <div class="secondCho">?</div>
            </div>
            <div class="inputGroup">
              <input class="wordInput" type="text" />
              <div class="submitBtn">입력</div>
            </div>
          </div>
          <div class="startBtn">시 작</div>
        </div>

        <div class="player2Section">
          <div class="p2Name">player2</div>
          <div class="p2Photo">
            <div class="avatar">
              <svg
                width="200"
                height="150"
                viewBox="0 0 180 180"
                xmlns="http://www.w3.org/2000/svg"
              >
                <!-- 배경 원 -->
                <circle cx="90" cy="90" r="90" fill="url(#bgGrad2)" />

                <defs>
                  <linearGradient id="bgGrad2" x1="0" y1="0" x2="180" y2="0">
                    <stop offset="0%" stop-color="#c3b1e1" />
                    <!-- 연보라색 -->
                    <stop offset="100%" stop-color="#f7c5d9" />
                    <!-- 연핑크색 -->
                  </linearGradient>
                </defs>

                <!-- 캐릭터 그룹 (머리, 얼굴, 드레스) -->
                <g id="character2">
                  <!-- 머리 -->
                  <g id="hair2">
                    <path
                      d="M50 70 Q90 15 130 70 Q125 140 55 130 Z"
                      fill="#f4a261"
                    />
                  </g>

                  <!-- 얼굴 -->
                  <g id="face2">
                    <circle cx="90" cy="90" r="30" fill="#ffe0c0" />
                    <circle cx="78" cy="85" r="4" fill="#3B2C2C" />
                    <circle cx="102" cy="85" r="4" fill="#3B2C2C" />
                    <path
                      d="M78 105 Q90 115 102 105"
                      stroke="#c47171"
                      stroke-width="3"
                      fill="none"
                    />
                  </g>

                  <!-- 드레스 -->
                  <g id="dress2">
                    <path
                      d="M60 130 Q90 160 120 130 L120 170 L60 170 Z"
                      fill="#6a9cf7"
                      stroke="#4574c1"
                      stroke-width="3"
                    />
                  </g>
                </g>

                <!-- 왕관 -->
                <g id="crown2">
                  <path
                    d="M50 50 L65 30 L80 50 L95 30 L110 50 L50 50 Z"
                    fill="#ffdd55"
                    stroke="#ccaa00"
                    stroke-width="3"
                  />
                  <circle cx="65" cy="30" r="4" fill="#fff88f" />
                  <circle cx="95" cy="30" r="4" fill="#fff88f" />
                </g>
              </svg>
            </div>
          </div>

          <div class="p2ChatSrceen">
            <div class="p2ChatList"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
