<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />

    <title>초성게임</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="wrap">
      <div class="dim"></div>

      <div class="gameSettings">
        <i class="fa-solid fa-gear"></i>
        <div class="timeSetting">
          <i class="fa-regular fa-clock"></i>
          <div class="timeModal">
            <h2>시간설정</h2>
            <div class="timeCloseBtn"><i class="fa-solid fa-x"></i></div>

            <div class="timePanel">
              <div class="timeScreen">
                <ul class="timeSlide">
                  <li>15s</li>
                  <li>30s</li>
                  <li>45s</li>
                  <li>60s</li>
                </ul>
              </div>

              <div class="arrows">
                <div class="prev">
                  <i class="fa-solid fa-angle-left"></i>
                </div>
                <div class="next">
                  <i class="fa-solid fa-angle-right"></i>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="gameInfo">
          <i class="fa-solid fa-question"></i>
          <div class="gameInfoModal">
            <div class="gameInfoCloseBtn">
              <i class="fa-solid fa-x"></i>
            </div>
            <h2>
              초성게임은 주어진 시간 안에 초성에 알맞은 단어를 상대방보다 더
              많이 입력한 사람이 이기는 게임입니다.
            </h2>
          </div>
        </div>
      </div>

      <div class="enterRoomBtn">입장하기</div>

      <div class="gameRoom">
        <div class="player1Section">
          <div class="p1Name">player1</div>
          <div class="p1Photo">
            <img src="./images/player1photo.jpg" alt="player1" />
          </div>

          <div class="p1ChatSrceen">
            <div class="p1ChatList"></div>
          </div>
        </div>

        <div class="gameCenter">
          <div class="chosungContainer">
            <div class="chosungScreen">
              <div class="firstCho">?</div>
              <div class="secondCho">?</div>
            </div>
            <div class="inputGroup">
              <input class="wordInput" type="text" />
              <div class="submitBtn">입력</div>
            </div>
          </div>
          <div class="startBtn">시 작</div>
        </div>

        <div class="player2Section">
          <div class="p2Name">player2</div>
          <div class="p2Photo">
            <img src="./images/nobody.jpg" alt="player2" />
          </div>

          <div class="p2ChatSrceen">
            <div class="p2ChatList"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
